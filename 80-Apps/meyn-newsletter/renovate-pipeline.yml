# Renovate Bot Pipeline for Automated Dependency Updates
# Runs daily to check for security updates

trigger: none  # Don't run on code push

schedules:
  # Run daily at 6 AM UTC for security updates
  - cron: '0 6 * * *'
    displayName: 'Daily security scan'
    branches:
      include:
        - main
    always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: hse-newsletter-vars

steps:
  - checkout: self
    fetchDepth: 1

  - task: UseNode@1
    displayName: 'Use Node.js 24'
    inputs:
      version: '24.x'

  - task: Bash@3
    displayName: 'Install pnpm'
    inputs:
      targetType: 'inline'
      script: |
        corepack enable
        corepack prepare pnpm@9.15.0 --activate
        pnpm --version

  - task: Bash@3
    displayName: 'Run Renovate'
    inputs:
      targetType: 'inline'
      script: |
        node --version
        npx --yes renovate@latest \
          --platform=azure \
          --endpoint="https://dev.azure.com/Meyn-Poland/" \
          --token="$RENOVATE_TOKEN" \
          "HSE-Newsletter-Manager/HSE-Newsletter-Manager"
    env:
      RENOVATE_TOKEN: $(RENOVATE_TOKEN)
      LOG_LEVEL: info
