name: Sync docs with config

on:
  push:
    branches:
      - main
    paths:
      - '60-Utility/Personal/Dockerfile'
      - '60-Utility/Personal/package.json'
      - '60-Utility/Personal/renovate-pipeline.yml'
      - '60-Utility/Personal/azure-pipelines.yml'

jobs:
  sync:
    name: Update docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: bash .github/scripts/sync-docs.sh

      - name: Commit updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add \
            60-Utility/Personal/README.md \
            60-Utility/Personal/docs/HOW_IT_WORKS.md \
            60-Utility/Personal/renovate-pipeline.yml
          git commit -m "docs: sync versions from config files [skip ci]"
          git push
